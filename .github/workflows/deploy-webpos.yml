name: deploy-webpos

on:
  push:
    branches: [ "main" ]
    paths:
      - "HN_Nexus.WebPOS/**"
      - ".github/workflows/deploy-webpos.yml"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./HN_Nexus.WebPOS
          file: ./HN_Nexus.WebPOS/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hn-nexus-webpos:latest

      - name: Trigger remote deploy
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"
